<!DOCTYPE html>
<html>
<head lang="en">
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Aibek</title>
  <link rel="stylesheet" type="text/css" href="scss/style.css" />
  <style>
    /* Page layout: sidebar + game */
    .layout--debug {
      display: flex;
      flex-direction: row;
      height: 100vh;
      overflow: hidden;
      padding-left: 0 !important;
      padding-right: 0 !important;
    }
    .layout--debug .layout__container {
      flex: 1;
      position: relative;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      top: auto;
      transform: none;
      height: 100vh;
    }
    .layout--debug .layout__sidebar {
      display: none;
    }

    /* Debug panel sidebar */
    #debug-panel {
      position: fixed;
      top: 12px;
      left: 12px;
      width: 280px;
      max-height: calc(100vh - 24px);
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #ccc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      user-select: none;
      overflow: hidden;
      z-index: 10001;
      backdrop-filter: blur(6px);
    }

    /* Header */
    .debug-panel__header {
      padding: 14px 16px;
      font-weight: bold;
      font-size: 14px;
      letter-spacing: 0.5px;
      color: #fff;
      background: rgba(0,0,0,0.85);
      border-bottom: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px 6px 0 0;
      flex-shrink: 0;
    }

    /* Scrollable body */
    .debug-panel__body {
      padding: 8px 16px 16px;
      overflow-y: auto;
      flex: 1;
    }
    .debug-panel__body::-webkit-scrollbar {
      width: 4px;
    }
    .debug-panel__body::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 2px;
    }

    /* Sections (collapsible) */
    .debug-panel__section {
      margin-top: 14px;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.4);
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .debug-panel__section:first-child { margin-top: 4px; }
    .debug-panel__section::after {
      content: '▾';
      font-size: 10px;
      transition: transform 0.15s;
    }
    .debug-panel__section.collapsed::after {
      transform: rotate(-90deg);
    }
    .debug-panel__section-content {
      overflow: hidden;
      transition: max-height 0.2s ease;
    }
    .debug-panel__section-content.collapsed {
      max-height: 0 !important;
      margin: 0;
    }

    /* Action buttons */
    .debug-panel__actions {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    .debug-panel__btn {
      flex: 1;
      padding: 6px 8px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: #fff;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .debug-panel__btn:hover {
      background: rgba(255,255,255,0.1);
    }
    .debug-panel__btn:active {
      background: rgba(255,255,255,0.2);
    }
    .debug-panel__btn--full {
      width: 100%;
      margin-top: 12px;
    }

    /* State display */
    .debug-panel__state {
      padding: 6px 8px;
      margin-bottom: 4px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }
    .debug-panel__state span {
      color: #fff;
      font-weight: 600;
    }

    /* Toggles */
    .debug-panel__toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      cursor: pointer;
    }
    .debug-panel__toggle input {
      margin: 0;
      cursor: pointer;
      accent-color: #fff;
    }

    /* Sliders */
    .debug-panel__slider {
      margin-bottom: 10px;
    }
    .debug-panel__slider-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3px;
      font-size: 11px;
    }
    .debug-panel__slider-label span:last-child {
      color: #fff;
      font-weight: 600;
    }
    .debug-panel__slider input[type="range"] {
      width: 100%;
      height: 16px;
      cursor: pointer;
      accent-color: #fff;
    }

    /* Preset controls */
    .debug-panel__presets {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .debug-panel__select {
      width: 100%;
      padding: 5px 6px;
      background: #111;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: #fff;
      font-family: monospace;
      font-size: 11px;
      cursor: pointer;
    }
    .debug-panel__select:focus { border-color: #fff; outline: none; }
    .debug-panel__input {
      flex: 1;
      min-width: 0;
      padding: 5px 6px;
      background: #111;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      color: #fff;
      font-family: monospace;
      font-size: 11px;
    }
    .debug-panel__input::placeholder { color: rgba(255,255,255,0.3); }
    .debug-panel__input:focus { border-color: #fff; outline: none; }
    .debug-panel__preset-row {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .debug-panel__preset-row .debug-panel__select { flex: 1; min-width: 0; }
    .debug-panel__btn--icon {
      width: 28px;
      height: 28px;
      padding: 0;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      line-height: 1;
    }
    .debug-panel__btn--danger {
      color: #ef5350;
      border-color: rgba(239,83,80,0.3);
    }
    .debug-panel__btn--danger:hover {
      background: rgba(239,83,80,0.15);
    }

    /* Info tooltip icon */
    .debug-panel__info {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      margin-left: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5);
      font-size: 9px;
      font-style: italic;
      font-weight: 700;
      cursor: help;
      position: relative;
      vertical-align: middle;
    }
    .debug-panel__info:hover {
      background: rgba(255,255,255,0.3);
      color: #fff;
    }
    .debug-panel__info:hover::after {
      content: attr(data-tip);
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      background: #000;
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      font-size: 10px;
      font-style: normal;
      font-weight: normal;
      padding: 5px 8px;
      border-radius: 4px;
      white-space: nowrap;
      z-index: 10000;
      pointer-events: none;
      max-width: 220px;
      white-space: normal;
      line-height: 1.3;
    }

    /* Toast notification */
    .debug-panel__toast {
      padding: 6px 8px;
      margin-top: 6px;
      text-align: center;
      font-size: 11px;
      color: #fff;
      opacity: 0;
      transition: opacity 0.3s;
    }

    /* Fullscreen button */
    #fullscreen-btn {
      position: fixed;
      bottom: 12px;
      right: 12px;
      width: 44px;
      height: 44px;
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      z-index: 10000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    #fullscreen-btn:hover {
      background: rgba(0,0,0,0.9);
    }

    /* Scaled mode: shared by mobile and fullscreen */
    .scaled-mode {
      padding: 0 !important;
    }
    .scaled-mode .layout__container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      transform: none;
      z-index: 9998;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    .scaled-mode .js-viewport.viewport {
      width: 100vw !important;
      height: 100vh !important;
      margin: 0;
      box-shadow: none;
      overflow: hidden;
    }
    .scaled-mode #js-starswinger {
      display: block;
      width: 100vw;
      height: 100vh;
      object-fit: contain;
    }
    .scaled-mode #debug-panel,
    .scaled-mode .layout__sidebar {
      display: none !important;
    }

    /* Autoplay panel — fixed top-right overlay */
    #autoplay-panel {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 220px;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #ccc;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
      font-size: 12px;
      user-select: none;
      z-index: 10001;
      backdrop-filter: blur(6px);
    }
    #autoplay-panel .debug-panel__header {
      padding: 10px 14px;
      font-size: 12px;
      border-radius: 6px 6px 0 0;
    }
    #autoplay-panel .debug-panel__body {
      padding: 8px 14px 12px;
    }
    #autoplay-panel .debug-panel__toggle {
      margin-bottom: 4px;
    }
    #autoplay-panel .debug-panel__slider {
      margin-bottom: 6px;
    }

    /* Mobile auto-enters scaled mode */
    @media (max-width: 900px) {
      #debug-panel,
      .layout__sidebar {
        display: none !important;
      }
    }
  </style>

</head>

<script>
(function() {
  var btn = document.getElementById('fullscreen-btn');
  var body = document.body;
  var canvasEl = document.getElementById('js-starswinger');
  var GAME_HEIGHT = 640;
  var DEFAULT_WIDTH = 1200;

  function isScaled() {
    return document.fullscreenElement || body.classList.contains('scaled-mode');
  }

  function applyScaledCanvas() {
    // Canvas stays at fixed camera dimensions (1200x640).
    // CSS object-fit: contain handles display scaling to any screen size.
    if (typeof setMouseVariables === 'function') setMouseVariables();
  }

  function restoreDefaultCanvas() {
    if (typeof setMouseVariables === 'function') setMouseVariables();
  }

  function enterScaledMode() {
    body.classList.add('scaled-mode');
    btn.innerHTML = '&#x2716;';
    applyScaledCanvas();
  }

  function exitScaledMode() {
    body.classList.remove('scaled-mode');
    btn.innerHTML = '&#x26F6;';
    restoreDefaultCanvas();
  }

  // Auto-enter scaled mode on mobile
  var mobileQuery = window.matchMedia('(max-width: 900px)');
  if (mobileQuery.matches) {
    enterScaledMode();
  }
  mobileQuery.addEventListener('change', function(e) {
    if (e.matches) {
      enterScaledMode();
    } else if (!document.fullscreenElement) {
      exitScaledMode();
    }
  });

  // Fullscreen button
  btn.addEventListener('click', function() {
    if (!document.fullscreenElement) {
      var el = document.documentElement;
      var rfs = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
      if (rfs) {
        rfs.call(el);
      } else {
        // iOS fallback — no fullscreen API, just use scaled mode
        if (body.classList.contains('scaled-mode')) {
          exitScaledMode();
        } else {
          enterScaledMode();
        }
      }
    } else {
      var efs = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
      if (efs) efs.call(document);
    }
  });

  document.addEventListener('fullscreenchange', function() {
    if (document.fullscreenElement) {
      enterScaledMode();
    } else {
      if (!mobileQuery.matches) {
        exitScaledMode();
      } else {
        // Stay in scaled mode on mobile after exiting fullscreen
        applyScaledCanvas();
      }
    }
  });

  window.addEventListener('resize', function() {
    if (isScaled() || mobileQuery.matches) {
      applyScaledCanvas();
    }
  });
})();
</script>
